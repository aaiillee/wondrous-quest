<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wondrous Quest</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c2d30;
            color: white;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        p {
            margin-top: 0;
            font-size: clamp(12px, 3vw, 16px);
            color: #ccc;
            padding: 0 10px;
            margin-bottom: 10px;
        }

        #game-container {
            width: 90vw;
            max-width: 800px;
            height: 30vh;
            min-height: 200px;
            border: 4px solid #fb479e;
            background-image: url('bg.jpg'); 
            background-size: 1000px 100%; 
            background-repeat: repeat-x;
            background-position: 0 0;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(251, 71, 158, 0.3);
            border-radius: 8px;
            animation: scrollStreet 11s linear infinite;
            animation-play-state: paused;
        }

        @keyframes scrollStreet {
            from { background-position: 0 0; }
            to { background-position: 1000px 0; } 
        }

        #game-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: #fb479e;
        }

        #ui-layer {
            position: absolute;
            top: 15px;
            left: 20px; 
            font-weight: bold;
            font-size: clamp(16px, 4vw, 20px);
            z-index: 20;
            color: #fff;
            display: none;
        }

        #character {
            width: 65px;  
            height: 95px; 
            position: absolute;
            bottom: 4px; 
            right: 15%; 
            z-index: 10;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            animation: walkCycle 0.4s infinite;
            animation-play-state: paused;
        }

        #character.jump {
            animation: jumpAnim 0.55s ease-out !important; 
            background-image: url('game-cat.png') !important; 
        }

        @keyframes walkCycle {
            0%, 50% { background-image: url('game-cat2.png'); }
	    51%,100% { background-image: url('game-cat3.png'); } 
        }

        @keyframes jumpAnim {
            0% { bottom: 4px; }
            45% { bottom: 50%; } 
            55% { bottom: 50%; }
            100% { bottom: 4px; }
        }

        #carrot {
            position: absolute;
            bottom: 4px;
            left: -80px; 
            line-height: 1;
            z-index: 5;
            display: none; 
        }

        .move {
            display: block !important;
            animation: moveAnim linear forwards;
        }

        @keyframes moveAnim {
            0% { left: -80px; }
            100% { left: 100%; }
        }

        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(37, 37, 37, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 40;
        }

        #game-logo {
            width: 80%;
            max-width: 500px;
            height: auto;
            max-height: 150px;
            margin-bottom: 0px;
            object-fit: contain;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            display: none;
        }

        #fireworks-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            pointer-events: none;
        }

        #message {
            margin: 0 0 20px 0;
            font-size: clamp(24px, 6vw, 36px);
            letter-spacing: 2px;
            z-index: 31;
        }

        .pixel-btn {
            padding: 10px 25px;
            font-size: clamp(16px, 4vw, 20px);
            cursor: pointer;
            font-family: "Jersey 25", 'Courier New', Courier, monospace, fantasy;
            font-weight: bold;
            background: #d9fced;
            color: #292727;
            border: 4px solid #09bbc8;
	    border-radius: 12px;
            box-shadow: inset -4px -4px 0px rgba(255,255,255), 0px 4px 4px #09bbc8;
            text-transform: uppercase;
            transition: all 0.1s;
            z-index: 31;
        }

        .pixel-btn:active {
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.2), 0px 0px 0px #8a2be2;
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body>

    <p>Tap, Click, or Press SPACE to jump. Survive for 30 seconds!</p>

    <div id="game-container">
        <div id="start-overlay">
            <img id="game-logo" src="wondrous-quest-logo.png" alt="Wondrous Quest Logo">
            <button id="start-btn" class="pixel-btn">GAME START</button>
        </div>

        <div id="ui-layer">
            Time: <span id="time">30</span>s
        </div>
        
        <div id="character"></div>
        <div id="carrot" class="carrot">🥕</div>
        
        <div id="overlay">
            <canvas id="fireworks-canvas"></canvas>
            <h1 id="message"></h1>
            <button id="retry-btn" class="pixel-btn">Retry</button>
        </div>
    </div>

    <script>
        const character = document.getElementById("character");
        const carrot = document.getElementById("carrot");
        const timeDisplay = document.getElementById("time");
        const overlay = document.getElementById("overlay");
        const startOverlay = document.getElementById("start-overlay");
        const uiLayer = document.getElementById("ui-layer");
        const message = document.getElementById("message");
        const retryBtn = document.getElementById("retry-btn");
        const startBtn = document.getElementById("start-btn");
        const gameContainer = document.getElementById("game-container");
        
        const canvas = document.getElementById("fireworks-canvas");
        const ctx = canvas.getContext("2d");
        let particles = [];

        let isJumping = false;
        let isGameOver = false;
        let gameStarted = false;
        let timeLeft = 30;
        let timerInterval;
        let collisionInterval;
        let spawnTimeout;

        function jump() {
            if (isJumping || isGameOver || !gameStarted) return;
            isJumping = true;
            character.classList.add("jump");
            setTimeout(() => {
                character.classList.remove("jump");
                isJumping = false;
            }, 550);
        }

        document.addEventListener("keydown", (e) => { 
            if (e.code === "Space" || e.code === "ArrowUp") jump(); 
        });

        gameContainer.addEventListener("mousedown", jump);
        gameContainer.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); }, { passive: false });

		// Function to handle the start button interaction
		e.preventDefault();  // Prevents the simulated ghost click
 	    e.stopPropagation(); // Prevents bubbling up to the game container
 	    initGame();
		};

		// Function to handle the retry button interaction
		const handleRetry = (e) => {
  		e.preventDefault();  // Prevents the simulated ghost click
  		e.stopPropagation(); // Prevents bubbling up to the game container
 		resetGame();
		};
		
		// Ensure both listeners are still attached
		startBtn.addEventListener("click", handleStart);
		startBtn.addEventListener("touchstart", handleStart, { passive: false });

		retryBtn.addEventListener("click", handleRetry);
		retryBtn.addEventListener("touchstart", handleRetry, { passive: false });

        function spawnCarrot() {
            if (isGameOver) return;
            carrot.classList.remove("move");
            void carrot.offsetWidth; 
            const sizes = [4, 6, 7]; 
            carrot.style.fontSize = sizes[Math.floor(Math.random() * sizes.length)] + "vh";
            const speeds = [0.8, 1.0, 1.3, 1.5, 1.8];
            carrot.style.animationDuration = speeds[Math.floor(Math.random() * speeds.length)] + "s";
            carrot.classList.add("move");
            carrot.onanimationend = () => {
                carrot.classList.remove("move");
                if (isGameOver) return;
                spawnTimeout = setTimeout(spawnCarrot, Math.random() * 1500);
            };
        }

        function initGame() {
            startOverlay.style.display = "none";
            uiLayer.style.display = "block";
            gameStarted = true;
            startGame();
        }

        function startGame() {
            character.style.animationPlayState = 'running';
            gameContainer.style.animationPlayState = 'running';
            isGameOver = false;
            timeLeft = 30;
            timeDisplay.innerText = timeLeft;
            overlay.style.display = "none";
            clearTimeout(spawnTimeout);
            carrot.classList.remove("move");
            spawnCarrot();
            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.innerText = timeLeft;
                if (timeLeft <= 0) endGame(true);
            }, 1000);
            collisionInterval = setInterval(() => {
                if (isGameOver) return;
                let charRect = character.getBoundingClientRect();
                let carrotRect = carrot.getBoundingClientRect();
                if (charRect.left < carrotRect.right - 10 && charRect.right > carrotRect.left + 10 && charRect.bottom > carrotRect.top + 10) {
                    endGame(false);
                }
            }, 10);
        }

        function endGame(isWin) {
            character.style.animationPlayState = 'paused';
            gameContainer.style.animationPlayState = 'paused';
            isGameOver = true;
            carrot.style.animationPlayState = 'paused'; 
            clearInterval(timerInterval); 
            clearInterval(collisionInterval); 
            clearTimeout(spawnTimeout);
            overlay.style.display = "flex";
            if (isWin) {
                message.innerText = "Congratulation!";
                message.style.color = "#00ff88"; 
                retryBtn.innerText = "Play Again";
            } else {
                message.innerText = "FAIL";
                message.style.color = "#ff3366"; 
                retryBtn.innerText = "Retry";
            }
        }

        function resetGame() {
            carrot.style.animationPlayState = 'running';
            startGame();
        }
    </script>
</body>
</html>
