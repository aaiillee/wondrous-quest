<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wondrous Quest - Responsive Mini Game</title>
    <style>
        /* Responsive Retro RPG / Arcade Styling */
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2b1b3d;
            color: white;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        h2 {
            color: #fbdc00;
            text-shadow: 2px 2px 0px #8a2be2;
            margin-bottom: 5px;
        }

        p {
            margin-top: 0;
            font-size: clamp(12px, 3vw, 16px);
            color: #ccc;
            padding: 0 10px;
        }

        /* Responsive Game Container */
        #game-container {
            width: 90vw;
            max-width: 800px;
            height: 30vh;
            min-height: 200px;
            border: 4px solid #fbdc00;
            background-color: #1a1025;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(251, 220, 0, 0.3);
            border-radius: 8px;
        }

        /* The Ground */
        #game-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: #fbdc00;
        }

        #ui-layer {
            position: absolute;
            top: 15px;
            left: 20px; /* Moved timer to the left */
            font-weight: bold;
            font-size: clamp(16px, 4vw, 20px);
            z-index: 20;
            color: #fff;
        }

        /* Character on the RIGHT, facing LEFT */
        #character {
            width: 40px;
            height: 40px;
            position: absolute;
            bottom: 4px; 
            right: 15%; /* Positioned on the right side */
            font-size: clamp(30px, 8vw, 40px);
            line-height: 40px;
            text-align: center;
            z-index: 10;
            transform: scaleX(-1); /* Flips the runner emoji to face left */
        }

        /* Responsive Jump Animation */
        .jump {
            animation: jumpAnim 0.55s ease-out;
        }

        @keyframes jumpAnim {
            0% { bottom: 4px; }
            45% { bottom: 50%; } /* Jumps halfway up the container */
            55% { bottom: 50%; }
            100% { bottom: 4px; }
        }

        /* Carrot starts on the LEFT */
        #carrot {
            position: absolute;
            bottom: 4px;
            left: -80px; /* Start off-screen to the left */
            line-height: 1;
            z-index: 5;
            display: none; /* Hidden until spawned */
        }

        /* Move Left to Right */
        .move {
            display: block !important;
            animation: moveAnim linear forwards;
        }

        @keyframes moveAnim {
            0% { left: -80px; }
            100% { left: 100%; }
        }

        /* Game Over / Win Overlay */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            display: none;
        }

        #message {
            margin: 0 0 20px 0;
            font-size: clamp(24px, 6vw, 36px);
            letter-spacing: 2px;
        }

        button {
            padding: 10px 25px;
            font-size: clamp(16px, 4vw, 20px);
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            background: #fbdc00;
            color: #1a1025;
            border: none;
            border-radius: 4px;
            box-shadow: 3px 3px 0px #8a2be2;
            transition: all 0.1s;
        }

        button:active {
            box-shadow: 0px 0px 0px #8a2be2;
            transform: translate(3px, 3px);
        }
    </style>
</head>
<body>

    <h2>WONDROUS QUEST</h2>
    <p>Tap, Click, or Press SPACE to jump. Survive for 30 seconds!</p>

    <div id="game-container">
        <div id="ui-layer">
            Time: <span id="time">30</span>s
        </div>
        
        <div id="character">🏃‍♂️</div>
        <div id="carrot" class="carrot">🥕</div>
        
        <div id="overlay">
            <h1 id="message"></h1>
            <button id="retry-btn" onclick="resetGame()">Retry</button>
        </div>
    </div>

    <script>
        const character = document.getElementById("character");
        const carrot = document.getElementById("carrot");
        const timeDisplay = document.getElementById("time");
        const overlay = document.getElementById("overlay");
        const message = document.getElementById("message");
        const retryBtn = document.getElementById("retry-btn");
        const gameContainer = document.getElementById("game-container");

        let isJumping = false;
        let isGameOver = false;
        let timeLeft = 30;
        let timerInterval;
        let collisionInterval;
        let spawnTimeout;

        // Responsive Jump Mechanics
        function jump() {
            if (isJumping || isGameOver) return;
            isJumping = true;
            character.classList.add("jump");
            
            setTimeout(() => {
                character.classList.remove("jump");
                isJumping = false;
            }, 550);
        }

        // Input Listeners for all devices
        document.addEventListener("keydown", (e) => { 
            if (e.code === "Space" || e.code === "ArrowUp") jump(); 
        });
        gameContainer.addEventListener("mousedown", jump);
        gameContainer.addEventListener("touchstart", (e) => {
            e.preventDefault(); // Prevent double firing on touch devices
            jump();
        });

        // Unpredictable Carrot Spawner (Requirement 2)
        function spawnCarrot() {
            if (isGameOver) return;

            // Reset animation
            carrot.classList.remove("move");
            void carrot.offsetWidth; // Trigger DOM reflow to restart animation

            // Randomize Size (Responsive sizes based on viewport height)
            const sizes = [4, 6, 8]; // vh units
            const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
            carrot.style.fontSize = randomSize + "vh";

            // Randomize Speed (0.8s to 1.8s to cross screen)
            const speeds = [0.8, 1.0, 1.3, 1.5, 1.8];
            const randomSpeed = speeds[Math.floor(Math.random() * speeds.length)];
            carrot.style.animationDuration = randomSpeed + "s";

            // Start movement
            carrot.classList.add("move");

            // When the carrot reaches the other side, spawn another one with a random delay
            carrot.onanimationend = () => {
                carrot.classList.remove("move");
                if (isGameOver) return;
                
                // Sudden appearances: random delay between 0 and 1.5 seconds
                const randomDelay = Math.random() * 1500; 
                spawnTimeout = setTimeout(spawnCarrot, randomDelay);
            };
        }

        function startGame() {
            // Reset state
            isGameOver = false;
            timeLeft = 30;
            timeDisplay.innerText = timeLeft;
            overlay.style.display = "none";
            clearTimeout(spawnTimeout);
            carrot.classList.remove("move");
            
            // Start the first spawn
            spawnCarrot();

            // 60-Second Timer
            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    endGame(true); // Win condition met
                }
            }, 1000);

            // Responsive Collision Detection
            collisionInterval = setInterval(() => {
                if (isGameOver) return;

                // getBoundingClientRect gives exact screen coordinates, working perfectly on any resize
                let charRect = character.getBoundingClientRect();
                let carrotRect = carrot.getBoundingClientRect();

                // Hitbox detection with slight padding for fairness
                if (
                    charRect.left < carrotRect.right - 10 &&
                    charRect.right > carrotRect.left + 10 &&
                    charRect.bottom > carrotRect.top + 10
                ) {
                    endGame(false); // Hit the carrot -> Fail
                }
            }, 10);
        }

        function endGame(isWin) {
            isGameOver = true;
            
            // Freeze everything
            carrot.style.animationPlayState = 'paused'; 
            clearInterval(timerInterval); 
            clearInterval(collisionInterval); 
            clearTimeout(spawnTimeout);
            
            // Show result screen
            overlay.style.display = "flex";
            if (isWin) {
                message.innerText = "Congratulation!";
                message.style.color = "#00ff88"; // Success green
                retryBtn.innerText = "Play Again";
            } else {
                message.innerText = "fail";
                message.style.color = "#ff3366"; // Fail red
                retryBtn.innerText = "Retry";
            }
        }

        function resetGame() {
            carrot.style.animationPlayState = 'running';
            startGame();
        }

        // Initialize the game on load
        startGame();
    </script>
</body>
</html>
