<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wondrous Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff1493;
            --black: #0d0d0d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            overflow: hidden;
        }

        /* 6:4 Aspect Ratio Container */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 6 / 4;
            background-color: var(--black);
            overflow: hidden;
            box-shadow: 0 0 15px var(--pink);
            border: 4px solid var(--pink);
        }

        /* Seamless Scrolling Background */
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.jpg');
            background-size: 200% 100%; 
            background-repeat: repeat-x;
            z-index: 1;
        }

        .bg-animate {
            animation: scrollBg 8s linear infinite;
        }

        @keyframes scrollBg {
            0% { background-position: 200% 0; }
            100% { background-position: 0 0; }
        }

        /* UI Overlays */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* FIXED: Proportional spacing instead of fixed pixels */
        #logo {
            max-width: 55%;
            margin-bottom: 4%;
        }

        /* Instructions Text */
        #instructions {
            font-size: 0.8vw;
            line-height: 1.6;
            margin-bottom: 4%;
            color: #fff;
            text-shadow: 2px 2px 0 var(--black);
        }

        .highlight-text {
            color: var(--pink);
        }

        h1 {
            color: var(--pink);
            text-shadow: 2px 2px 0px #fff;
            margin-bottom: 4%;
            font-size: 2vw;
            position: relative;
            z-index: 2;
        }

        /* FIXED: Proportional padding instead of fixed pixels */
        button {
            background-color: transparent;
            color: var(--pink);
            border: 3px solid var(--pink);
            padding: 2% 4%;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8vw;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 2;
        }

        button:hover {
            background-color: var(--pink);
            color: #fff;
        }

        /* Timer */
        #timer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 5;
            font-size: 1.5vw;
            color: var(--pink);
            text-shadow: 2px 2px 0 #000;
        }

        /* Cat & Shadow Container */
        #cat-container {
            position: absolute;
            right: 15%;
            bottom: 10%;
            height: 25%;
            z-index: 5;
            display: flex;
            justify-content: center;
        }

        #cat {
            position: relative;
            height: 100%;
            bottom: 0;
            transition: bottom 0.3s cubic-bezier(0.2, 0.8, 0.4, 1);
            z-index: 2;
        }

        /* Dynamic Drop Shadow */
        #shadow {
            position: absolute;
            bottom: -5px; 
            width: 60%;
            height: 15px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            filter: blur(2px);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.4, 1);
            z-index: 1;
        }

        .jump {
            bottom: 120% !important; 
        }

        .shadow-jump {
            transform: scale(0.4);
            opacity: 0.2;
        }

        /* Obstacles (Carrots) */
        .carrot {
            position: absolute;
            bottom: 10%;
            left: -10%;
            font-size: 3rem; 
            z-index: 4;
        }

        .carrot-inner {
            animation: tumble 0.5s linear infinite;
            display: inline-block;
        }

        @keyframes moveRight {
            0% { left: -10%; }
            100% { left: 110%; }
        }

        @keyframes tumble {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Real CSS Particle Fireworks */
        .fireworks-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; 
            overflow: hidden;
        }

        .firework {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 
                0 -45px 0 var(--pink), 0 45px 0 #fff,
                -45px 0 0 #fff, 45px 0 0 var(--pink),
                -32px -32px 0 var(--pink), 32px 32px 0 #fff,
                -32px 32px 0 #fff, 32px -32px 0 var(--pink);
            animation: bang 1.2s ease-out infinite;
            opacity: 0;
        }

        @keyframes bang {
            0% { transform: scale(0); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Responsive Text and proper mobile grouping */
        @media (max-width: 600px) {
            h1 { font-size: 4vw; }
            button { 
                font-size: 3.5vw; 
                padding: 3% 6%;
                border-width: 2px;
            }
            #timer { font-size: 3vw; }
            #instructions { 
                font-size: 3vw; 
                margin-bottom: 5%;
            }
            #logo {
                max-width: 70%;
                margin-bottom: 5%;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Game World -->
        <div id="background"></div>
        <div id="timer" class="hidden">Time: 30</div>
        
        <!-- The Cat & Shadow -->
        <div id="cat-container" class="hidden">
            <img id="cat" src="game-cat2.png" alt="Black Cat">
            <div id="shadow"></div>
        </div>

        <!-- Screens -->
        <div id="start-screen" class="screen">
            <img id="logo" src="wondrous-quest-logo.png" alt="Wondrous Quest">
            <div id="instructions">
                Tap, Click, or Press SPACE to jump.<br>
                <span class="highlight-text">Survive for 30 seconds!</span>
            </div>
            <button onclick="startGame()">Game Start</button>
        </div>

        <div id="fail-screen" class="screen hidden">
            <h1>FAIL</h1>
            <button onclick="startGame()">Retry</button>
        </div>

        <div id="win-screen" class="screen hidden">
            <div class="fireworks-container">
                <div class="firework" style="top: 30%; left: 20%; animation-delay: 0s;"></div>
                <div class="firework" style="top: 50%; left: 80%; animation-delay: 0.2s;"></div>
                <div class="firework" style="top: 20%; left: 60%; animation-delay: 0.4s;"></div>
                <div class="firework" style="top: 60%; left: 30%; animation-delay: 0.6s;"></div>
                <div class="firework" style="top: 40%; left: 50%; animation-delay: 0.8s;"></div>
            </div>
            <h1>CONGRATULATION!</h1>
            <button onclick="startGame()">Retry</button>
        </div>
    </div>

    <script>
        const catContainer = document.getElementById('cat-container');
        const cat = document.getElementById('cat');
        const shadow = document.getElementById('shadow');
        const background = document.getElementById('background');
        const timerElement = document.getElementById('timer');
        const startScreen = document.getElementById('start-screen');
        const failScreen = document.getElementById('fail-screen');
        const winScreen = document.getElementById('win-screen');
        const container = document.getElementById('game-container');

        let isJumping = false;
        let isGameOver = true;
        let timeLeft = 30;
        let gameLoop;
        let timerInterval;
        let walkInterval;
        let obstacleTimeout;
        let walkCycle = 2;

        function jump() {
            if (isJumping || isGameOver) return;
            isJumping = true;
            
            cat.src = 'game-cat1.png';
            cat.classList.add('jump');
            shadow.classList.add('shadow-jump');

            setTimeout(() => {
                cat.classList.remove('jump');
                shadow.classList.remove('shadow-jump');
                
                setTimeout(() => {
                    isJumping = false;
                    if (!isGameOver) {
                        cat.src = walkCycle === 2 ? 'game-cat2.png' : 'game-cat3.png';
                    }
                }, 300); 
            }, 350); 
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') jump();
        });
        container.addEventListener('touchstart', jump);
        container.addEventListener('mousedown', jump);

        function startWalkCycle() {
            walkInterval = setInterval(() => {
                if (!isJumping && !isGameOver) {
                    walkCycle = walkCycle === 2 ? 3 : 2;
                    cat.src = `game-cat${walkCycle}.png`;
                }
            }, 100); 
        }

        function spawnCarrot() {
            if (isGameOver) return;

            const carrotWrapper = document.createElement('div');
            carrotWrapper.classList.add('carrot');
            
            const carrotInner = document.createElement('div');
            carrotInner.classList.add('carrot-inner');
            carrotInner.innerHTML = '🥕';
            
            carrotWrapper.appendChild(carrotInner);
            
            const randomScale = (Math.random() * 0.4 + 0.8).toFixed(2);
            
            const travelTime = 1.6; 
            
            carrotWrapper.style.transform = `scale(${randomScale})`;
            carrotWrapper.style.animation = `moveRight ${travelTime}s linear`;
            
            container.appendChild(carrotWrapper);

            setTimeout(() => {
                if (carrotWrapper.parentElement) carrotWrapper.remove();
            }, travelTime * 1000);

            const nextSpawnTime = Math.random() * 800 + 900; 
            obstacleTimeout = setTimeout(spawnCarrot, nextSpawnTime);
        }

        function checkCollision() {
            if (isGameOver) return;

            const catRect = cat.getBoundingClientRect();
            const carrots = document.querySelectorAll('.carrot');

            const catHitbox = {
                left: catRect.left + (catRect.width * 0.25),
                right: catRect.right - (catRect.width * 0.25),
                top: catRect.top + (catRect.height * 0.25),
                bottom: catRect.bottom - (catRect.height * 0.1)
            };

            carrots.forEach(carrot => {
                const carrotRect = carrot.getBoundingClientRect();
                
                const carrotHitbox = {
                    left: carrotRect.left + 15,
                    right: carrotRect.right - 15,
                    top: carrotRect.top + 15,
                    bottom: carrotRect.bottom - 10
                };
                
                if (
                    catHitbox.left < carrotHitbox.right &&
                    catHitbox.right > carrotHitbox.left &&
                    catHitbox.top < carrotHitbox.bottom &&
                    catHitbox.bottom > carrotHitbox.top
                ) {
                    endGame(false);
                }
            });

            if (!isGameOver) {
                gameLoop = requestAnimationFrame(checkCollision);
            }
        }

        function updateTimer() {
            if (isGameOver) return;
            timeLeft--;
            timerElement.innerText = `Time: ${timeLeft}`;

            if (timeLeft <= 0) {
                endGame(true);
            }
        }

        function startGame() {
            startScreen.classList.add('hidden');
            failScreen.classList.add('hidden');
            winScreen.classList.add('hidden');
            timerElement.classList.remove('hidden');
            catContainer.classList.remove('hidden');
            
            document.querySelectorAll('.carrot').forEach(c => c.remove());

            isGameOver = false;
            timeLeft = 30;
            timerElement.innerText = `Time: ${timeLeft}`;
            
            background.classList.add('bg-animate');
            cat.src = 'game-cat2.png';

            clearInterval(timerInterval);
            clearInterval(walkInterval);
            clearTimeout(obstacleTimeout);
            
            timerInterval = setInterval(updateTimer, 1000);
            startWalkCycle();
            
            obstacleTimeout = setTimeout(spawnCarrot, 800); 
            gameLoop = requestAnimationFrame(checkCollision);
        }

        function endGame(isWin) {
            isGameOver = true;
            background.classList.remove('bg-animate');
            cat.src = 'game-cat1.png'; 
            
            clearInterval(timerInterval);
            clearInterval(walkInterval);
            clearTimeout(obstacleTimeout);
            cancelAnimationFrame(gameLoop);

            if (isWin) {
                winScreen.classList.remove('hidden');
            } else {
                failScreen.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
